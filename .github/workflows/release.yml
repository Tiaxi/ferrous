name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-rpm:
    name: Build RPM (Fedora ${{ matrix.fedora }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [43, 44]
    container:
      image: fedora:${{ matrix.fedora }}
    steps:
      - name: Install build dependencies
        run: |
          dnf -y install \
            git \
            cmake \
            ninja-build \
            gcc-c++ \
            zsh \
            curl \
            rpm-build \
            desktop-file-validate \
            pkgconf-pkg-config \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            qt6-qtquickcontrols2-devel \
            kf6-kirigami-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.94.1
          echo 'source "$HOME/.cargo/env"' >> "$HOME/.bashrc"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Mark repo safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build RPM
        env:
          FERROUS_LASTFM_API_KEY: ${{ secrets.FERROUS_LASTFM_API_KEY }}
          FERROUS_LASTFM_SHARED_SECRET: ${{ secrets.FERROUS_LASTFM_SHARED_SECRET }}
        run: |
          . "$HOME/.cargo/env"
          version="${GITHUB_REF_NAME#v}"
          ./scripts/build-rpm.sh \
            --release "1%{?dist}" \
            --no-check

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v5
        with:
          name: rpm-package-fc${{ matrix.fedora }}
          path: dist/rpm/RPMS/**/*.rpm

  build-deb:
    name: Build deb (Ubuntu)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:25.04
    steps:
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            git \
            cmake \
            ninja-build \
            g++ \
            zsh \
            curl \
            pkg-config \
            dpkg-dev \
            debhelper \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            qt6-base-dev \
            qt6-declarative-dev \
            qml6-module-qtquick-controls \
            libkirigami-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.94.1
          . "$HOME/.cargo/env"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build deb
        env:
          FERROUS_LASTFM_API_KEY: ${{ secrets.FERROUS_LASTFM_API_KEY }}
          FERROUS_LASTFM_SHARED_SECRET: ${{ secrets.FERROUS_LASTFM_SHARED_SECRET }}
        run: |
          . "$HOME/.cargo/env"
          cp -r packaging/debian .
          DEB_BUILD_OPTIONS=nocheck dpkg-buildpackage -us -uc -b
          mkdir -p dist/deb
          cp ../*.deb dist/deb/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: deb-package
          path: dist/deb/*.deb

  create-release:
    name: Create GitHub Release
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: packages

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/rpm-package-fc*/**/*.rpm
            packages/deb-package/**/*.deb
