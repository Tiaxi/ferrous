name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust-backend:
    name: Rust Backend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux deps for gst feature
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --features gst -- -D clippy::pedantic

      - name: Test (GStreamer backend)
        run: cargo test --features gst

      - name: Test (mock backend)
        run: cargo test

  ui:
    name: UI Build + Smoke Tests
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install system dependencies
        run: |
          dnf -y install \
            git \
            cmake \
            ninja-build \
            gcc-c++ \
            zsh \
            rust \
            cargo \
            pkgconf-pkg-config \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            qt6-qtquickcontrols2-devel \
            kf6-kirigami-devel

      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure UI
        run: cmake -S ui -B ui/build -G Ninja

      - name: Build UI
        run: cmake --build ui/build -j2

      - name: Run UI smoke tests
        run: ctest --test-dir ui/build --output-on-failure
