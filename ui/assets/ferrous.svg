<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a3342" />
            <stop offset="100%" stop-color="#12161d" />
        </linearGradient>

        <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#e2eaf1" />
            <stop offset="40%" stop-color="#9eb0c0" />
            <stop offset="100%" stop-color="#4d6278" />
        </linearGradient>

        <linearGradient id="copperGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f29c78" />
            <stop offset="50%" stop-color="#b65734" />
            <stop offset="100%" stop-color="#6b2b14" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <circle cx="128" cy="128" r="112" fill="url(#bgGrad)" filter="url(#shadow)" />

    <circle cx="128" cy="128" r="110" fill="none" stroke="#3b465a" stroke-width="2" />

    <g filter="url(#shadow)">
        <path d="M 85 200
              C 85 105, 110 65, 185 60
              C 135 80, 115 110, 115 200 Z"
              fill="url(#copperGrad)" />

        <path d="M 60 205
              C 60 90, 95 45, 195 40
              C 130 65, 100 100, 100 205 Z"
              fill="url(#silverGrad)" />

        <path d="M 65 145
              C 110 110, 145 100, 180 95
              C 135 115, 110 135, 95 160 Z"
              fill="url(#silverGrad)" />

        <path d="M 80 148
              C 115 120, 140 110, 165 105
              C 130 125, 110 140, 100 160 Z"
              fill="url(#copperGrad)" />
        </g>
    </svg>
